name: GymPerformance
options:
  bundleIdPrefix: uk.co.wayoflifefitness
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.5"

attributes:
  LastUpgradeCheck: "2650"
  BuildIndependentTargetsInParallel: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    EXCLUDED_SOURCE_FILE_NAMES: "*.md"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    DEAD_CODE_STRIPPING: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES

targets:
  GymPerformance:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GymPerformance
        excludes:
          - "**/*.md"
      - path: src/data
        excludes:
          - "**/*.md"
      - path: src/core
        excludes:
          - "**/*.md"
      - path: src/resources/local-store
        excludes:
          - "**/*.md"
      - path: src/client/ios/member-surface
        excludes:
          - "**/*.md"
      - path: src/utilities/access-control
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: uk.co.wayoflifefitness.gymperformance
        INFOPLIST_FILE: GymPerformance/Info.plist
        DEVELOPMENT_ASSET_PATHS: GymPerformance/PreviewContent
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_APPICONS: YES
    info:
      path: GymPerformance/Info.plist
      properties:
        CFBundleDisplayName: GymPerformance
        UILaunchStoryboardName: LaunchScreen
        UILaunchScreen:
          UIColorName: LaunchScreenBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: ""

  GymPerformanceTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: tests
        excludes:
          - "**/*.md"
    dependencies:
      - target: GymPerformance
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: uk.co.wayoflifefitness.gymperformanceTests

schemes:
  GymPerformance:
    build:
      targets:
        GymPerformance: all
        GymPerformanceTests: [test]
    test:
      targets:
        - GymPerformanceTests
