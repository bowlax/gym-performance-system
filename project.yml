name: GymPerformance
options:
  bundleIdPrefix: com.gymperformance
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    EXCLUDED_SOURCE_FILE_NAMES: "*.md"

targets:
  GymPerformance:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GymPerformance
        excludes:
          - "**/*.md"
      - path: src/data
        excludes:
          - "**/*.md"
      - path: src/core
        excludes:
          - "**/*.md"
      - path: src/resources/local-store
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gymperformance.GymPerformance
        INFOPLIST_FILE: GymPerformance/Info.plist
        DEVELOPMENT_ASSET_PATHS: GymPerformance/PreviewContent
    info:
      path: GymPerformance/Info.plist
      properties:
        CFBundleDisplayName: GymPerformance
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: ""

  GymPerformanceTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: tests
        excludes:
          - "**/*.md"
    dependencies:
      - target: GymPerformance
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  GymPerformance:
    build:
      targets:
        GymPerformance: all
        GymPerformanceTests: [test]
    test:
      targets:
        - GymPerformanceTests
