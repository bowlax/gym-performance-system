# Supabase local development configuration.
# See https://supabase.com/docs/guides/cli/config

project_id = "gym-performance-system"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_signup = true

[functions.token-broker]
verify_jwt = false

[functions.log-set]
verify_jwt = true

[functions.add-manual-pb]
verify_jwt = true

[functions.reset-current-pb]
verify_jwt = true

[functions.delete-personal-best]
verify_jwt = true
